<script type="text/html" data-template-name="edgelink-pg-store">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
        <input type="text" id="node-input-name" placeholder="PG-写入">
    </div>
    <div class="form-row">
        <label for="node-input-pgConfig"><i class="fa fa-database"></i> PG配置</label>
        <input type="text" id="node-input-pgConfig">
    </div>
    <div class="form-row">
        <label for="node-input-tableName"><i class="fa fa-table"></i> 表名</label>
        <input type="text" id="node-input-tableName" placeholder="plc_data">
    </div>
    <div class="form-row">
        <label></label>
        <span style="font-size:0.85em; color:#888;">
            支持 <code>${deviceId}</code> 动态分表：<code>plc_data_${deviceId}</code>
        </span>
    </div>
    <hr style="margin:8px 0;">
    <div class="form-row">
        <label for="node-input-batchSize"><i class="fa fa-cubes"></i> 每批条数</label>
        <input type="number" id="node-input-batchSize" placeholder="100" min="1" max="10000">
    </div>
    <div class="form-row">
        <label for="node-input-bufferMax"><i class="fa fa-inbox"></i> 主缓冲上限</label>
        <input type="number" id="node-input-bufferMax" placeholder="5000" min="100">
    </div>
    <div class="form-row">
        <label for="node-input-flushInterval"><i class="fa fa-clock-o"></i> 定时刷新(ms)</label>
        <input type="number" id="node-input-flushInterval" placeholder="5000">
        <span style="font-size:0.85em; color:#888;">0 = 仅按批量或 msg.flush 触发</span>
    </div>
    <hr style="margin:8px 0;">
    <div class="form-row">
        <label for="node-input-retryBufferMax"><i class="fa fa-undo"></i> 重试缓冲上限</label>
        <input type="number" id="node-input-retryBufferMax" placeholder="1000" min="100">
    </div>
    <div class="form-row">
        <label for="node-input-retryInterval"><i class="fa fa-refresh"></i> 重试间隔(ms)</label>
        <input type="number" id="node-input-retryInterval" placeholder="5000" min="1000">
    </div>
    <hr style="margin:8px 0;">
    <div class="form-row">
        <label></label>
        <input type="checkbox" id="node-input-autoCreateTable" style="display:inline-block; width:auto;">
        <label for="node-input-autoCreateTable" style="display:inline; width:auto; margin-left:4px;">
            <i class="fa fa-magic"></i> 表不存在时自动建表
        </label>
    </div>
    <div class="form-row">
        <label></label>
        <input type="checkbox" id="node-input-useTimescaleDB" style="display:inline-block; width:auto;">
        <label for="node-input-useTimescaleDB" style="display:inline; width:auto; margin-left:4px;">
            <i class="fa fa-line-chart"></i> 创建 TimescaleDB 超表
        </label>
        <span style="font-size:0.85em; color:#888;">
            （需数据库已安装 TimescaleDB 扩展）
        </span>
    </div>
</script>

<script type="text/html" data-help-name="edgelink-pg-store">
    <h3>EdgeLink PG 批量写入节点</h3>
    <p>接收上游 <b>mitsubishi-read</b> / <b>modbus-read</b> 采集数据，批量写入 PostgreSQL/TimescaleDB。</p>

    <h4>输入格式（自动识别三种）</h4>
    <p><b>1. MC 驱动格式</b>（接 mitsubishi-read / modbus-read）</p>
    <pre><code>msg.payload = {
    success: true,
    deviceId: "PLC-烘炉-1号",
    data: {
        "温度": { rawValue: 2530, engValue: 253.0, quality: 0, ts: "...", regType: "D" }
    }
}</code></pre>
    <p><b>2. 批量 rows</b>（inject + function 构造）</p>
    <pre><code>msg.payload = {
    rows: [
        { sensor: "temp", value: 25.5, ts: "2026-06-29T16:00:00Z" },
        { sensor: "press", value: 1.2, ts: "2026-06-29T16:00:00Z" }
    ]
}
msg.topic = "sensor_data"   // 可选，指定表名</code></pre>
    <p><b>3. 单行 object</b>（inject 直接写）</p>
    <pre><code>msg.payload = {
    sensor: "temp",
    value: 25.5,
    ts: "2026-06-29T16:00:00Z"
}
msg.topic = "sensor_data"</code></pre>

    <h4>动态控制</h4>
    <ul>
        <li><code>msg.tableName</code>：动态覆盖表名（三种格式均支持）</li>
        <li><code>msg.topic</code>：指定表名（通用格式，优先级低于 msg.tableName）</li>
        <li><code>msg.flush = true</code>：强制立即写入</li>
    </ul>

    <h4>输出格式</h4>
    <pre><code>// 缓冲中
msg.payload = { success: true, inserted: 0, buffered: 15, originalData: {...} }

// 写入完成
msg.payload = { success: true, inserted: 100, buffered: 0, roundTimeMs: 45 }</code></pre>

    <h4>表名模板</h4>
    <p>支持 <code>${deviceId}</code> 占位符：</p>
    <ul>
        <li><code>plc_data</code> → 统一表</li>
        <li><code>plc_${deviceId}</code> → 按设备分表（如 <code>plc_PLC_烘炉_1号</code>，特殊字符自动转下划线）</li>
    </ul>

    <h4>缓冲与重试</h4>
    <ul>
        <li><b>主缓冲</b>：数据先入缓冲，满足 batchSize 或定时器到期或 msg.flush 时批量写入</li>
        <li><b>重试缓冲</b>：写入失败的数据进入 FIFO 重试队列，固定间隔重试</li>
        <li><b>超限保护</b>：缓冲满时丢弃最老数据并输出 warn 日志</li>
    </ul>

    <h4>表结构（autoCreateTable=true 时）</h4>
    <pre><code>CREATE TABLE IF NOT EXISTS plc_data (
    insert_time   TIMESTAMPTZ NOT NULL,
    device_id     VARCHAR(64) NOT NULL,
    tag_id        VARCHAR(64) NOT NULL,
    register_type VARCHAR(8),
    raw_value     NUMERIC,
    eng_value     NUMERIC,
    quality       INTEGER DEFAULT 0,
    PRIMARY KEY (insert_time, device_id, tag_id)
);</code></pre>

    <h4>状态指示</h4>
    <ul>
        <li><span style="color:green;">●</span> 绿色：写入成功</li>
        <li><span style="color:gold;">●</span> 黄色：缓冲中</li>
        <li><span style="color:red;">●</span> 红色：写入失败</li>
    </ul>
</script>

<script type="text/javascript">
    RED.nodes.registerType('edgelink-pg-store', {
        category: 'storage',
        color: '#C7E9C0',
        defaults: {
            name: { value: '' },
            pgConfig: { type: 'edgelink-pg-config', required: true },
            tableName: { value: 'plc_data', required: true },
            batchSize: { value: 100, validate: RED.validators.number() },
            bufferMax: { value: 5000, validate: RED.validators.number() },
            flushInterval: { value: 5000, validate: RED.validators.number() },
            retryBufferMax: { value: 1000, validate: RED.validators.number() },
            retryInterval: { value: 5000, validate: RED.validators.number() },
            autoCreateTable: { value: false },
            useTimescaleDB: { value: false }
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-upload',
        label: function () {
            return this.name || 'PG-写入';
        },
        paletteLabel: 'PG 写入'
    });
</script>
